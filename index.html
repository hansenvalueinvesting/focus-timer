<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

.ambient { position: fixed; top: -80px; left: 50%; transform: translateX(-50%); width: 440px; height: 440px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); pointer-events: none; transition: background 1.5s; z-index: 0; }

.lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }

.lb-rank.silver { color: #94a3b8; font-weight: 700; }

<body>

<div class="ambient" id="ambient"></div>
<div class="wrap">
  <div class="header"><h1>get on the grind.</h1></div>

  <div class="stats-strip">
    <div class="stat-item"><div class="stat-val" id="stripToday">0m</div><div class="stat-lbl">today</div></div>
    <div class="stat-div"></div>
    <div class="stat-item"><div class="stat-val" id="stripLifetime">0m</div><div class="stat-lbl">lifetime</div></div>
  </div>

  <div class="gauge-wrap" id="gaugeWrap" onclick="handleGaugeClick()">
    <svg class="gauge-svg" width="220" height="220" viewBox="0 0 220 220">
      <circle cx="110" cy="110" r="88" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14" stroke-dasharray="453.3 99.7" stroke-dashoffset="-55.3" stroke-linecap="round"/>
      <circle id="progressCircle" cx="110" cy="110" r="88" fill="none" stroke="#94a3b8" stroke-width="14" stroke-dasharray="0 553" stroke-dashoffset="-55.3" stroke-linecap="round" style="filter:drop-shadow(0 0 10px #94a3b899);transition:stroke-dasharray 1s linear,stroke 0.5s"/>
    </svg>
    <div class="gauge-center">
      <div class="gauge-emoji">⏱️</div>
      <div class="gauge-time" id="gaugeTime" style="color:rgba(255,255,255,0.25)">—</div>
      <div class="gauge-sub" id="gaugeSub">tap to start</div>
      <div class="gauge-label" id="gaugeLabel" style="color:#94a3b8"></div>
    </div>
  </div>

  <div class="controls" id="controls" style="visibility:hidden">
    <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="btn btn-end" onclick="endEarly()">End Session</button>
  </div>

  <div class="quick-cards" id="quickCards">
    <div class="quick-card" onclick="startTimer(5)"><div class="qc-icon">⚡</div><div class="qc-label">Quick</div><div class="qc-mins">5 min</div></div>
    <div class="quick-card" onclick="startTimer(15)"><div class="qc-icon">🌱</div><div class="qc-label">Focus</div><div class="qc-mins">15 min</div></div>
    <div class="quick-card" onclick="startTimer(30)"><div class="qc-icon">🔥</div><div class="qc-label">Deep Work</div><div class="qc-mins">30 min</div></div>
  </div>

  <div class="picker" id="pickerBox" style="display:none">
    <div class="picker-title">Set Duration</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="startTimer(25)">25m</button>
      <button class="preset-btn" onclick="startTimer(45)">45m</button>
      <button class="preset-btn" onclick="startTimer(60)">60m</button>
      <button class="preset-btn" onclick="startTimer(90)">90m</button>
      <button class="preset-btn" onclick="startTimer(120)">120m</button>
      <button class="preset-btn" onclick="startTimer(180)">180m</button>
    </div>
    <div class="custom-row">
      <input class="custom-input" type="number" min="1" max="480" placeholder="Custom mins" id="customInput" onkeydown="if(event.key==='Enter')startCustom()">
      <button class="btn-start-custom" onclick="startCustom()">Start</button>
    </div>
    <button class="btn-cancel" onclick="closePicker()">Cancel</button>
  </div>

  <button class="btn-custom-open" id="customOpenBtn" onclick="openPicker()">Custom Duration</button>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('stats',this)">My Stats</button>
    <button class="tab-btn" onclick="switchTab('leaderboard',this)">Leaderboard</button>
    <button class="tab-btn" onclick="switchTab('global',this)">Global</button>
  </div>

  <div class="pane active" id="pane-stats">
    <div class="stat-cards">
      <div class="stat-card"><div class="sc-icon">🏆</div><div class="sc-val" id="sc-lifetime" style="color:#facc15">0m</div><div class="sc-lbl">Lifetime Focus</div></div>
      <div class="stat-card"><div class="sc-icon">📅</div><div class="sc-val" id="sc-today" style="color:#4ade80">0m</div><div class="sc-lbl">Today</div></div>
      <div class="stat-card"><div class="sc-icon">🎯</div><div class="sc-val" id="sc-sessions" style="color:#a78bfa">—</div><div class="sc-lbl">Sessions</div></div>
      <div class="stat-card"><div class="sc-icon">📊</div><div class="sc-val" id="sc-avg" style="color:#fb923c">—</div><div class="sc-lbl">Avg Session</div></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Last 14 Days</div>
      <div style="position:relative;height:90px"><canvas id="personalChart"></canvas></div>
    </div>
    <div class="section-label">Session History</div>
    <div id="sessionList"></div>
    <button class="btn-load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none"></button>
  </div>

  <div class="pane" id="pane-leaderboard">
    <div class="lb-name-row">
      <span class="lb-name-label">Your name</span>
      <input class="lb-name-input" id="lbNameInput" maxlength="24" placeholder="Enter your name…" oninput="saveLbName()">
    </div>
    <div class="section-label" style="margin-top:4px;display:flex;justify-content:space-between;align-items:center">
      <span id="lbDateLabel"></span>
      <span id="lbCountdown" style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25)"></span>
    </div>
    <div id="lbList"></div>
    <button class="btn-load-more" id="lbLoadMoreBtn" onclick="lbLoadMore()" style="display:none">Load 10 more ↓</button>
  </div>

  <div class="pane" id="pane-global">
    <div class="stat-cards" style="margin-bottom:16px;">
      <div class="stat-card"><div class="sc-icon">🌍</div><div class="sc-val" id="gc-total" style="color:#4ade80">—</div><div class="sc-lbl">All Time Focus</div></div>
      <div class="stat-card"><div class="sc-icon">⚡</div><div class="sc-val" id="gc-today" style="color:#facc15">—</div><div class="sc-lbl">Today (Global)</div></div>
      <div class="stat-card"><div class="sc-icon">🎯</div><div class="sc-val" id="gc-sessions" style="color:#a78bfa">—</div><div class="sc-lbl">Sessions</div></div>
      <div class="stat-card"><div class="sc-icon">📊</div><div class="sc-val" id="gc-avg" style="color:#fb923c">—</div><div class="sc-lbl">Avg Session</div></div>
    </div>

    <div id="globalDayList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LIFETIME_KEY = 'focus_lifetime_minutes';
const SESSIONS_KEY = 'focus_sessions';
function getLifetime() { return parseInt(localStorage.getItem(LIFETIME_KEY)||'0',10); }
function saveLifetime(m) { localStorage.setItem(LIFETIME_KEY,String(m)); }
function getSessions() { try { return JSON.parse(localStorage.getItem(SESSIONS_KEY)||'[]'); } catch { return []; } }
function saveSessions(s) { localStorage.setItem(SESSIONS_KEY,JSON.stringify(s)); }

// Firebase — no trailing slash
const FIREBASE_URL = 'https://focus-app-dd888-default-rtdb.firebaseio.com';

async function fetchGlobalData() {
  try {
    const r = await fetch(FIREBASE_URL + '/global.json');
    const data = await r.json();
    return data || { total: 0, days: {}, sessions: [] };
  } catch { return { total: 0, days: {}, sessions: [] }; }
}
async function getGlobalTotal() { return (await fetchGlobalData()).total || 0; }
async function getGlobalDays()  { return (await fetchGlobalData()).days  || {}; }
async function getGlobalSessions() { return (await fetchGlobalData()).sessions || []; }
async function addGlobal(mins, completed) {
  try {
    const data = await fetchGlobalData();
    const today = new Date().toISOString().slice(0,10);
    data.total = (data.total||0) + mins;
    data.days  = data.days || {};
    data.days[today] = (data.days[today]||0) + mins;
    data.sessions = data.sessions || [];
    if (!Array.isArray(data.sessions)) data.sessions = Object.values(data.sessions);
    data.sessions.unshift({ duration: mins, timestamp: Date.now(), completed });
    await fetch(FIREBASE_URL + '/global.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch {}
}

function fmtMins(m) { if (!m) return '0m'; if (m<60) return m+'m'; const h=Math.floor(m/60),r=m%60; return r ? h+'h '+r+'m' : h+'h'; }
function fmtTime(s) { return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); }
function isToday(ts) { const d=new Date(ts),t=new Date(); return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear(); }
function todayKey() { return new Date().toISOString().slice(0,10); }
function getStatus(pct) {
  if (pct<=0)   return {label:'',          color:'#94a3b8'};
  if (pct<0.33) return {label:'Warming',   color:'#4ade80'};
  if (pct<0.66) return {label:'Deep Work', color:'#facc15'};
  return              {label:'Final Push', color:'#fb923c'};
}

let isRunning=false, isPaused=false;
let totalSecs=0, remaining=0;
let startTimestamp=0, pausedAt=0;
let interval=null;
let sessions=getSessions(), lifetime=getLifetime(), sessionShowAll=false;

const CIRC=2*Math.PI*88, ARC=CIRC*0.82;
function setProgress(pct) {
  const f=ARC*pct;
  document.getElementById('progressCircle').setAttribute('stroke-dasharray',f+' '+(CIRC-f));
}
function updateGaugeStatus(pct) {
  const st=getStatus(pct), prog=document.getElementById('progressCircle');
  prog.setAttribute('stroke',st.color);
  prog.style.filter=`drop-shadow(0 0 10px ${st.color}99)`;
  document.getElementById('gaugeLabel').style.color=st.color;
  document.getElementById('gaugeLabel').textContent=st.label;
  document.getElementById('ambient').style.background=isRunning
    ? `radial-gradient(circle,${st.color}11 0%,transparent 70%)`
    : 'radial-gradient(circle,rgba(99,102,241,0.06) 0%,transparent 70%)';
}

function startTimer(mins) {
  closePicker();
  totalSecs=mins*60; remaining=totalSecs;
  isRunning=true; isPaused=false;
  startTimestamp=Date.now();
  document.getElementById('gaugeWrap').style.cursor='default';
  document.getElementById('quickCards').style.display='none';
  document.getElementById('customOpenBtn').style.display='none';
  document.getElementById('pickerBox').style.display='none';
  document.getElementById('controls').style.visibility='visible';
  document.getElementById('gaugeSub').textContent='remaining';
  document.getElementById('gaugeTime').style.color='#fff';
  tick();
  interval=setInterval(tick,500);
}
function startCustom() { const v=parseInt(document.getElementById('customInput').value,10); if (v>0&&v<=480) startTimer(v); }

function tick() {
  if (!isRunning||isPaused) return;
  const elapsed=Math.floor((Date.now()-startTimestamp)/1000);
  remaining=Math.max(totalSecs-elapsed,0);
  const pct=1-remaining/totalSecs;
  setProgress(pct); updateGaugeStatus(pct);
  document.getElementById('gaugeTime').textContent=fmtTime(remaining);
  const tm=sessions.filter(s=>isToday(s.timestamp)).reduce((a,s)=>a+s.duration,0);
  document.getElementById('stripToday').textContent=fmtMins(tm);
  if (remaining<=0) { clearInterval(interval); finishSession(Math.round(totalSecs/60),true); }
}

function togglePause() {
  if (!isPaused) {
    isPaused=true; pausedAt=Date.now();
    document.getElementById('pauseBtn').textContent='Resume';
    document.getElementById('gaugeSub').textContent='paused';
    document.getElementById('gaugeLabel').textContent='Paused';
  } else {
    isPaused=false; startTimestamp+=(Date.now()-pausedAt);
    document.getElementById('pauseBtn').textContent='Pause';
    document.getElementById('gaugeSub').textContent='remaining';
    tick();
  }
}

function endEarly() {
  clearInterval(interval);
  const elapsed=Math.floor((totalSecs-remaining)/60);
  if (elapsed>0) finishSession(elapsed,false); else resetUI();
}

async function finishSession(mins,completed) {
  lifetime+=mins; saveLifetime(lifetime);
  await addGlobal(mins, completed);
  await updateLeaderboard(mins);
  sessions=[{duration:mins,timestamp:Date.now(),completed},...sessions.slice(0,99)];
  saveSessions(sessions);
  playDone();
  showToast(completed ? '🎯 Complete! +'+mins+'m logged' : '✓ +'+mins+'m saved');
  resetUI(); renderMyStats(); renderGlobalStats();
}

function resetUI() {
  isRunning=false; isPaused=false; totalSecs=0; remaining=0;
  clearInterval(interval);
  document.getElementById('gaugeWrap').style.cursor='pointer';
  document.getElementById('gaugeTime').textContent='—';
  document.getElementById('gaugeTime').style.color='rgba(255,255,255,0.25)';
  document.getElementById('gaugeSub').textContent='tap to start';
  document.getElementById('gaugeLabel').textContent='';
  setProgress(0); updateGaugeStatus(0);
  document.getElementById('controls').style.visibility='hidden';
  document.getElementById('quickCards').style.display='flex';
  document.getElementById('customOpenBtn').style.display='block';
  document.getElementById('pauseBtn').textContent='Pause';
}

function handleGaugeClick() { if (!isRunning) openPicker(); }
function openPicker() {
  document.getElementById('pickerBox').style.display='block';
  document.getElementById('customOpenBtn').style.display='none';
  document.getElementById('quickCards').style.display='none';
  setTimeout(()=>document.getElementById('customInput').focus(),50);
}
function closePicker() {
  document.getElementById('pickerBox').style.display='none';
  if (!isRunning) { document.getElementById('customOpenBtn').style.display='block'; document.getElementById('quickCards').style.display='flex'; }
}

function switchTab(id,btn) {
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
  if (id==='global') renderGlobalStats();
  if (id==='leaderboard') renderLeaderboard();
}

let personalChart=null;
function renderMyStats() {
  const todayMins=sessions.filter(s=>isToday(s.timestamp)).reduce((a,s)=>a+s.duration,0);
  const avg=sessions.length?Math.round(sessions.reduce((a,s)=>a+s.duration,0)/sessions.length):0;
  document.getElementById('sc-lifetime').textContent=fmtMins(lifetime);
  document.getElementById('sc-today').textContent=fmtMins(todayMins);
  document.getElementById('sc-sessions').textContent=sessions.length||'—';
  document.getElementById('sc-avg').textContent=avg?fmtMins(avg):'—';
  document.getElementById('stripLifetime').textContent=fmtMins(lifetime);
  document.getElementById('stripToday').textContent=fmtMins(todayMins);
  const dailyMap={};
  sessions.forEach(s=>{const k=new Date(s.timestamp).toISOString().slice(0,10);dailyMap[k]=(dailyMap[k]||0)+s.duration;});
  const labels=[],data=[];
  for (let i=13;i>=0;i--) { const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);labels.push(d.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}));data.push(dailyMap[k]||0); }
  const ctx=document.getElementById('personalChart').getContext('2d');
  if (personalChart) personalChart.destroy();
  personalChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data,fill:true,tension:0.4,borderColor:'#facc15',borderWidth:1.5,pointRadius:0,
      backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,90);g.addColorStop(0,'rgba(250,204,21,0.3)');g.addColorStop(1,'rgba(250,204,21,0)');return g;}}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(20,20,35,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'rgba(255,255,255,0.5)',bodyColor:'#facc15',callbacks:{label:ctx=>ctx.parsed.y+'m focused'}}},
      scales:{x:{grid:{display:false},ticks:{color:'rgba(255,255,255,0.25)',font:{size:9},maxTicksLimit:5},border:{display:false}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(255,255,255,0.2)',font:{size:9}},border:{display:false}}}}
  });
  renderSessionList();
}

function renderSessionList() {
  const list=document.getElementById('sessionList'),loadBtn=document.getElementById('loadMoreBtn');
  const visible=sessionShowAll?sessions:sessions.slice(0,7);
  list.innerHTML='';
  if (!sessions.length){list.innerHTML='<div class="empty-msg">No sessions yet 🎯</div>';loadBtn.style.display='none';return;}
  visible.forEach(s=>{
    const d=new Date(s.timestamp),el=document.createElement('div');
    el.className='session-entry';
    const pct=Math.min((s.duration/90)*100,100);
    el.innerHTML=`<div class="se-icon ${s.completed?'complete':'partial'}">${s.completed?'🎯':'⏱'}</div><div class="se-body"><div class="se-top"><span class="se-name">${s.duration}m ${s.completed?'completed':'partial'}</span><span class="se-time">${d.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})} · ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div class="se-bar-track"><div class="se-bar-fill ${s.completed?'complete':'partial'}" style="width:${pct}%"></div></div></div>`;
    list.appendChild(el);
  });
  if (sessions.length>7){loadBtn.style.display='block';loadBtn.textContent=sessionShowAll?'Show less ↑':`Load all ${sessions.length} sessions ↓`;}
  else loadBtn.style.display='none';
}
function loadMore(){sessionShowAll=!sessionShowAll;renderSessionList();}

async function renderGlobalStats() {
  const data = await fetchGlobalData();
  const total = data.total || 0;
  const days  = data.days  || {};
  const today = todayKey(), globalToday = days[today] || 0;

  const rawSessions = data.sessions || [];
  globalSessionsCache = Array.isArray(rawSessions)
    ? rawSessions
    : Object.values(rawSessions).sort((a,b) => b.timestamp - a.timestamp);

  document.getElementById('gc-total').textContent = fmtMins(total);
  document.getElementById('gc-today').textContent = fmtMins(globalToday);
  document.getElementById('gc-sessions').textContent = globalSessionsCache.length || '—';
  const globalAvg = globalSessionsCache.length ? Math.round(globalSessionsCache.reduce((a,s)=>a+s.duration,0) / globalSessionsCache.length) : 0;
  document.getElementById('gc-avg').textContent = globalAvg ? fmtMins(globalAvg) : '—';

  renderGlobalSessionList();
}

function renderGlobalSessionList() {
  const container = document.getElementById('globalDayList');
  container.innerHTML = '';

  if (!globalSessionsCache.length) {
    container.innerHTML = '<div class="empty-msg">No sessions logged yet 🌍</div>';
    return;
  }

  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = 'Session History';
  container.appendChild(lbl);

  const visible = globalSessionShowAll ? globalSessionsCache : globalSessionsCache.slice(0, 7);
  visible.forEach(s => {
    const d = new Date(s.timestamp), el = document.createElement('div');
    el.className = 'session-entry';
    const pct = Math.min((s.duration / 90) * 100, 100);
    el.innerHTML = `<div class="se-icon ${s.completed?'complete':'partial'}">${s.completed?'🎯':'⏱'}</div><div class="se-body"><div class="se-top"><span class="se-name">${s.duration}m ${s.completed?'completed':'partial'}</span><span class="se-time">${d.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})} · ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div class="se-bar-track"><div class="se-bar-fill ${s.completed?'complete':'partial'}" style="width:${pct}%"></div></div></div>`;
    container.appendChild(el);
  });

  if (globalSessionsCache.length > 7) {
    const btn = document.createElement('button');
    btn.className = 'btn-load-more';
    btn.textContent = globalSessionShowAll ? 'Show less ↑' : `Load all ${globalSessionsCache.length} sessions ↓`;
    btn.onclick = () => { globalSessionShowAll = !globalSessionShowAll; renderGlobalSessionList(); };
    container.appendChild(btn);
  }
}

let toastTimer=null, globalSessionShowAll=false, globalSessionsCache=[];
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);}

// ── Completion sound ───────────────────────────────────────────────────────────
function playDone() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch {}
}

// ── Leaderboard ────────────────────────────────────────────────────────────────
const LB_NAME_KEY = 'focus_lb_name';
const LB_UID_KEY  = 'focus_lb_uid';

function getLbName() { return localStorage.getItem(LB_NAME_KEY) || ''; }
function getLbUid()  {
  let uid = localStorage.getItem(LB_UID_KEY);
  if (!uid) { uid = 'u_' + Math.random().toString(36).slice(2,10); localStorage.setItem(LB_UID_KEY, uid); }
  return uid;
}

function saveLbName() {
  const val = document.getElementById('lbNameInput').value.trim().slice(0,24);
  localStorage.setItem(LB_NAME_KEY, val);
}

async function fetchLeaderboardData() {
  try {
    const r = await fetch(FIREBASE_URL + '/leaderboard.json');
    const data = await r.json();
    return data || {};
  } catch { return {}; }
}

async function updateLeaderboard(mins) {
  const name = getLbName();
  if (!name) return; // don't post anonymous entries with no name
  const uid = getLbUid();
  const today = todayKey();
  try {
    // read just this user's entry
    const r = await fetch(`${FIREBASE_URL}/leaderboard/${today}/${uid}.json`);
    const existing = await r.json();
    const current = (existing && existing.mins) ? existing.mins : 0;
    await fetch(`${FIREBASE_URL}/leaderboard/${today}/${uid}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.slice(0,24), mins: current + mins, uid, ts: Date.now() })
    });
  } catch {}
}

let lbCountdownInterval = null;

function startLbCountdown() {
  if (lbCountdownInterval) clearInterval(lbCountdownInterval);
  function update() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24, 0, 0, 0);
    const diff = Math.max(0, Math.floor((midnight - now) / 1000));
    const h = Math.floor(diff / 3600);
    const m = Math.floor((diff % 3600) / 60);
    const s = diff % 60;
    const el = document.getElementById('lbCountdown');
    if (el) el.textContent = `resets in ${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  }
  update();
  lbCountdownInterval = setInterval(update, 1000);
}



async function renderLeaderboard() {
  const uid = getLbUid();
  const today = todayKey();

  startLbCountdown();

  // Set date label
  document.getElementById('lbDateLabel').textContent =
    new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  // Pre-fill name input
  const nameInput = document.getElementById('lbNameInput');
  if (!nameInput.value) nameInput.value = getLbName();

  // Fetch today's entries
  let entries = [];
  try {
    const r = await fetch(`${FIREBASE_URL}/leaderboard/${today}.json`);
    const data = await r.json();
    if (data) {
      entries = Object.values(data).sort((a,b) => b.mins - a.mins);
    }
  } catch {}

  const list = document.getElementById('lbList');
  const loadBtn = document.getElementById('lbLoadMoreBtn');
  list.innerHTML = '';

  if (!entries.length) {
    list.innerHTML = '<div class="empty-msg">No one on the board yet today 🏆<br><span style="font-size:11px;color:rgba(255,255,255,0.15)">Complete a session to appear</span></div>';
    loadBtn.style.display = 'none';
    return;
  }

  const myIdx = entries.findIndex(e => e.uid === uid);
  const myEntry = myIdx >= 0 ? entries[myIdx] : null;
  const topEntries = entries.slice(0, lbVisible);
  const myInTop = myIdx >= 0 && myIdx < lbVisible;

  const medals = ['🥇','🥈','🥉'];
  const rankClass = ['gold','silver','bronze'];
  const maxMins = entries[0].mins;

  function makeRow(entry, rank) {
    const isMe = entry.uid === uid;
    const barPct = maxMins > 0 ? Math.round((entry.mins / maxMins) * 100) : 0;
    const row = document.createElement('div');
    row.className = 'lb-row' + (isMe ? ' you-row' : '');
    const medal = rank < 3 ? `<span class="lb-medal">${medals[rank]}</span>` : `<span class="lb-medal"></span>`;
    const rankLabel = `<span class="lb-rank ${rank < 3 ? rankClass[rank] : ''}">${rank+1}</span>`;
    const youTag = isMe ? `<span class="lb-you-tag">you</span>` : '';
    row.innerHTML = `
      <div class="lb-bar-fill" style="width:${barPct}%"></div>
      <div class="lb-row-inner">
        ${rankLabel}
        ${medal}
        <span class="lb-name${isMe?' you':''}">${entry.name}${youTag}</span>
        <span class="lb-mins">${fmtMins(entry.mins)}</span>
      </div>`;
    return row;
  }

  topEntries.forEach((entry, i) => list.appendChild(makeRow(entry, i)));

  // Show user outside top if not already visible
  if (myEntry && !myInTop) {
    const div = document.createElement('div');
    div.className = 'lb-divider';
    div.textContent = '· · ·';
    list.appendChild(div);
    list.appendChild(makeRow(myEntry, myIdx));
  }

  // Load more button
  if (entries.length > lbVisible) {
    loadBtn.style.display = 'block';
    loadBtn.textContent = `Load 10 more ↓ (${entries.length - lbVisible} remaining)`;
  } else {
    loadBtn.style.display = 'none';
  }
}

function lbLoadMore() {
  lbVisible += 10;
  renderLeaderboard();
}


document.addEventListener('visibilitychange',()=>{if(!document.hidden&&isRunning&&!isPaused)tick();});

setProgress(0); updateGaugeStatus(0);
renderMyStats();
renderGlobalStats();
</script>
